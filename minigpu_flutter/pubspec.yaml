name: minigpu_flutter
description: Flutter companion for minigpu. Re-exports the full minigpu API and provides MinigpuFlutterBinding for registering hot-restart teardown callbacks.
version: 1.5.2
repository: https://github.com/PracticalXR/minigpu/tree/main/minigpu_flutter

environment:
  sdk: ^3.11.4
  flutter: ">=3.24.0"

dependencies:
  flutter:
    sdk: flutter
  minigpu: 1.5.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  lints: ^5.0.0
