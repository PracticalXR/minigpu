name: minigpu
description: A library that brings multiplatform GPU compute to Dart and Flutter by wrapping the gpu.cpp library and webgpu with a Dawn backend.
version: 1.5.2
repository: https://github.com/PracticalXR/minigpu/tree/main/minigpu

#####

environment:
  sdk: ^3.11.4
  flutter: ">=1.20.0"

dependencies:
  flutter:
    sdk: flutter
  minigpu_platform_interface: 1.5.2
  minigpu_ffi: 1.5.2
  minigpu_web: 1.5.2

dev_dependencies:
  test: ^1.31.0
  ffi: ^2.0.2

#####

platforms:
  windows:
  android:
  linux:
  ios:
  macos:
  web:
