name: gpu_ml
description: GPU-accelerated ML inference for Dart and Flutter on WebGPU — GGUF loading, quantized weights (fused dequant kernels), and transformer/SSM building blocks on top of gpu_tensor.
version: 0.1.0
repository: https://github.com/PracticalXR/minigpu/tree/main/gpu_ml

environment:
  sdk: ^3.11.4
  flutter: ">=1.20.0"

dependencies:
  flutter:
    sdk: flutter
  gpu_tensor: ^1.5.8
  minigpu: 1.5.8

dev_dependencies:
  lints: ^5.0.0
  test: ^1.24.0

###

platforms:
  windows:
  android:
  linux:
  ios:
  macos:
  web:
